[routes]
GET @home:  / = App\Controllers\HomeController->index
GET @about: /about = App\Controllers\HomeController->about

; Web panel authentication (session based)
GET  @login:     /login    = App\Controllers\AuthController->showLogin
POST            /login     = App\Controllers\AuthController->login
GET  @register:  /register = App\Controllers\AuthController->showRegister
POST            /register  = App\Controllers\AuthController->register
POST @logout:    /logout   = App\Controllers\AuthController->logout
GET  @dashboard: /dashboard = App\Controllers\AuthController->dashboard

; API authentication (token based)
POST @api_register: /api/auth/register = App\Controllers\Api\AuthController->register
POST @api_login:    /api/auth/login    = App\Controllers\Api\AuthController->login
GET  @api_me:       /api/auth/me       = App\Controllers\Api\AuthController->me
POST @api_logout:   /api/auth/logout   = App\Controllers\Api\AuthController->logout

GET    @me:    /api/me     = App\Controllers\UserController->me

GET    @user_list:    /api/users     = App\Controllers\UserController->index
POST   @user_create:  /api/users     = App\Controllers\UserController->create
GET    @user_show:    /api/users/@id = App\Controllers\UserController->show
PUT    @user_replace: /api/users/@id = App\Controllers\UserController->replace
PATCH  @user_update:  /api/users/@id = App\Controllers\UserController->update
DELETE @user_delete:  /api/users/@id = App\Controllers\UserController->delete
