[routes]
GET @home:  / = App\Controllers\HomeController->index
GET @about: /about = App\Controllers\HomeController->about

GET    @me:    /api/me     = App\Controllers\UserController->me

GET    @user_list:    /api/users     = App\Controllers\UserController->index
POST   @user_create:  /api/users     = App\Controllers\UserController->create
GET    @user_show:    /api/users/@id = App\Controllers\UserController->show
PUT    @user_replace: /api/users/@id = App\Controllers\UserController->replace
PATCH  @user_update:  /api/users/@id = App\Controllers\UserController->update
DELETE @user_delete:  /api/users/@id = App\Controllers\UserController->delete
