<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 p-md-5">
                    <h1 class="h4 fw-bold mb-4">{{ @auth.register_title }}</h1>

                    <form method="post" action="{{ @BASE }}/register">
                        <input type="hidden" name="csrf" value="{{ @csrf_token }}">

                        <div class="mb-3">
                            <label class="form-label" for="name">{{ @auth.name }}</label>
                            <input type="text" class="form-control" id="name" name="name" required autofocus>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="email">{{ @auth.email }}</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="gender">{{ @auth.gender }}</label>
                            <select class="form-select" id="gender" name="gender">
                                <option value="">—</option>
                                <option value="Male">{{ @auth.gender_male }}</option>
                                <option value="Female">{{ @auth.gender_female }}</option>
                                <option value="Other">{{ @auth.gender_other }}</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="password">{{ @auth.password }}</label>
                            <input type="password" class="form-control" id="password" name="password" required minlength="6">
                        </div>

                        <div class="mb-4">
                            <label class="form-label" for="password_confirm">{{ @auth.confirm }}</label>
                            <input type="password" class="form-control" id="password_confirm" name="password_confirm" required minlength="6">
                        </div>

                        <button type="submit" class="btn btn-primary w-100">{{ @auth.submit_register }}</button>
                    </form>

                    <p class="text-muted text-center mt-4 mb-0">
                        {{ @auth.have_account }}
                        <a href="{{ @BASE }}/login">{{ @auth.login_title }}</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>
