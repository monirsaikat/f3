<!-- ===== Page header ===== -->
<section class="page-header">
  <div class="container">
    <h1>{{ @auth.login_title }}</h1>
    <div class="breadcrumb-atrio"><a href="{{ @BASE }}/">Home</a> / Sign In</div>
  </div>
</section>

<!-- ===== Login form ===== -->
<section class="auth-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-sm-9 col-md-7 col-lg-5 col-xl-4">
        <div class="auth-card">
          <p class="auth-sub">{{ @auth.no_account }}
            <a href="{{ @BASE }}/register" style="color:var(--pine);font-weight:600;">{{ @auth.register_title }}</a>
          </p>
          <form method="post" action="{{ @BASE }}/login" class="form-atrio">
            <input type="hidden" name="csrf" value="{{ @csrf_token }}">
            <div class="mb-4">
              <label for="email">{{ @auth.email }}</label>
              <input type="email" class="form-control" id="email" name="email"
                     required autofocus autocomplete="email">
            </div>
            <div class="mb-5">
              <label for="password">{{ @auth.password }}</label>
              <input type="password" class="form-control" id="password" name="password"
                     required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-atrio w-100 justify-content-center">
              {{ @auth.submit_login }}
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
