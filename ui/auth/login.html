<div class="auth-page">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-sm-9 col-md-7 col-lg-5 col-xl-4">

                <div class="text-center mb-4">
                    <h1 class="h4 fw-bold mb-1">{{ @auth.login_title }}</h1>
                    <p class="text-muted small mb-0">{{ @auth.no_account }}
                        <a href="{{ @BASE }}/register" class="fw-medium">{{ @auth.register_title }}</a>
                    </p>
                </div>

                <div class="card border-0">
                    <div class="card-body p-4">
                        <form method="post" action="{{ @BASE }}/login">
                            <input type="hidden" name="csrf" value="{{ @csrf_token }}">

                            <div class="mb-3">
                                <label class="form-label" for="email">{{ @auth.email }}</label>
                                <input type="email" class="form-control" id="email" name="email"
                                       required autofocus autocomplete="email">
                            </div>

                            <div class="mb-4">
                                <label class="form-label" for="password">{{ @auth.password }}</label>
                                <input type="password" class="form-control" id="password" name="password"
                                       required autocomplete="current-password">
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                {{ @auth.submit_login }}
                            </button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
