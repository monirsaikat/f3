<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 p-md-5">
                    <h1 class="h4 fw-bold mb-4">{{ @auth.login_title }}</h1>

                    <form method="post" action="{{ @BASE }}/login">
                        <input type="hidden" name="csrf" value="{{ @csrf_token }}">

                        <div class="mb-3">
                            <label class="form-label" for="email">{{ @auth.email }}</label>
                            <input type="email" class="form-control" id="email" name="email" required autofocus>
                        </div>

                        <div class="mb-4">
                            <label class="form-label" for="password">{{ @auth.password }}</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">{{ @auth.submit_login }}</button>
                    </form>

                    <p class="text-muted text-center mt-4 mb-0">
                        {{ @auth.no_account }}
                        <a href="{{ @BASE }}/register">{{ @auth.register_title }}</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>
