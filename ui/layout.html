<!DOCTYPE html>
<html lang="{{ @current_lang }}" dir="{{ @dir }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ @title }} · my-f3-app</title>
    <link rel="stylesheet" href="{{ @BASE }}/assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ @BASE }}/assets/css/app.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="{{ @BASE }}/">
                <img src="{{ @BASE }}/assets/img/logo.svg" alt="my-f3-app" class="brand-logo">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#nav" aria-controls="nav" aria-expanded="false"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item">
                        <a class="nav-link {{ @active=='home'?'active':'' }}" href="{{ @BASE }}/">{{ @nav.home }}</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {{ @active=='about'?'active':'' }}" href="{{ @BASE }}/about">{{ @nav.about }}</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ @BASE }}/api/users">{{ @nav.api }}</a>
                    </li>

                    <check if="{{ @current_user }}">
                        <true>
                            <li class="nav-item dropdown ms-lg-2">
                                <a class="nav-link dropdown-toggle" href="#" role="button"
                                   data-bs-toggle="dropdown" aria-expanded="false">
                                    👤 {{ @current_user.name }}
                                </a>
                                <ul class="dropdown-menu dropdown-menu-end">
                                    <li><a class="dropdown-item" href="{{ @BASE }}/dashboard">{{ @nav.dashboard }}</a></li>
                                    <li><hr class="dropdown-divider"></li>
                                    <li>
                                        <form method="post" action="{{ @BASE }}/logout" class="px-3 py-1">
                                            <input type="hidden" name="csrf" value="{{ @csrf_token }}">
                                            <button type="submit" class="btn btn-sm btn-outline-danger w-100">{{ @nav.logout }}</button>
                                        </form>
                                    </li>
                                </ul>
                            </li>
                        </true>
                        <false>
                            <li class="nav-item">
                                <a class="nav-link {{ @active=='login'?'active':'' }}" href="{{ @BASE }}/login">{{ @nav.login }}</a>
                            </li>
                            <li class="nav-item">
                                <a class="btn btn-sm btn-primary ms-lg-2" href="{{ @BASE }}/register">{{ @nav.register }}</a>
                            </li>
                        </false>
                    </check>

                    <li class="nav-item dropdown ms-lg-2">
                        <a class="nav-link dropdown-toggle" href="#" role="button"
                           data-bs-toggle="dropdown" aria-expanded="false">
                            🌐 {{ @current_lang_name }}
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <repeat group="{{ @languages }}" key="{{ @code }}" value="{{ @name }}">
                                <li>
                                    <a class="dropdown-item {{ @code==@current_lang?'active':'' }}"
                                       href="?lang={{ @code }}">{{ @name }}</a>
                                </li>
                            </repeat>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="flex-grow-1">
        <check if="{{ @flash }}">
            <div class="container mt-3">
                <div class="alert alert-{{ @flash.type }} alert-dismissible fade show" role="alert">
                    {{ @flash.message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            </div>
        </check>
        <include href="{{ @content }}" />
    </main>

    <footer class="bg-dark text-white-50 py-4 mt-auto">
        <div class="container d-flex flex-wrap justify-content-between">
            <span>&copy; {{ date('Y') }} my-f3-app</span>
            <span>{{ @footer.built }}</span>
        </div>
    </footer>

    <script src="{{ @BASE }}/assets/js/bootstrap.bundle.min.js"></script>
</body>
</html>
